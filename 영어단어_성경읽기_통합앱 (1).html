<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>영어단어 + 성경읽기 앱</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Malgun Gothic",Arial,sans-serif;background:#eef3f8;color:#111}
header{background:#153b63;color:white;text-align:center;padding:18px 12px;font-size:22px;font-weight:800}
.wrap{max-width:760px;margin:auto;padding:14px}
.card{background:white;border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 4px 14px rgba(0,0,0,.08);border:1px solid #dbe4ee}
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}
.tab{background:#dbeafe;color:#153b63;border:0;border-radius:12px;padding:12px;font-weight:800;font-size:15px}
.tab.active{background:#153b63;color:white}
h2{margin:6px 0 12px;color:#153b63}
.big{font-size:34px;font-weight:900;color:#153b63}
.mean{font-size:20px;font-weight:800;margin:8px 0}
button{border:0;border-radius:12px;padding:11px 14px;margin:5px;background:#2563eb;color:white;font-weight:800}
.gray{background:#64748b} .green{background:#16a34a} .red{background:#dc2626}
.progressBox{height:16px;background:#e5e7eb;border-radius:99px;overflow:hidden}
.bar{height:100%;background:#2563eb;width:0%}
.small{font-size:13px;color:#555;line-height:1.5}
ol{padding-left:22px;line-height:1.7}
.dayrow{display:flex;gap:8px;align-items:flex-start;border-bottom:1px solid #eee;padding:10px 0}
.dayrow input{width:22px;height:22px}
.daytext{flex:1}
textarea{width:100%;min-height:90px;border:1px solid #ccd6e0;border-radius:12px;padding:10px;font-size:15px}
.hidden{display:none}
.badge{display:inline-block;background:#eff6ff;color:#153b63;border-radius:99px;padding:5px 10px;font-weight:800;margin:3px}
</style>
</head>
<body>
<header>영어단어 1000개 + 신세계역 기준 신약 30일 읽기</header>
<div class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="showTab('home',this)">오늘</button>
    <button class="tab" onclick="showTab('english',this)">영어</button>
    <button class="tab" onclick="showTab('bible',this)">성경읽기</button>
  </div>

  <section id="home" class="card">
    <h2>오늘 할 일</h2>
    <p><span class="badge">영어 17단어</span><span class="badge">성경읽기 1일분</span><span class="badge">메모 1줄</span></p>
    <p class="small">의지가 약해도 괜찮습니다. 앱을 열고 “오늘 완료”만 누르는 습관부터 만드세요.</p>
    <h3>전체 진행률</h3>
    <p id="totalText"></p>
    <div class="progressBox"><div id="totalBar" class="bar"></div></div>
  </section>

  <section id="english" class="card hidden">
    <h2>영어단어 60일 마스터</h2>
    <p id="engDay"></p>
    <div class="progressBox"><div id="engBar" class="bar"></div></div>
    <p class="small">하루 17단어씩 50일 학습, 51~60일은 전체 복습입니다.</p>
    <hr>
    <div class="big" id="word"></div>
    <div class="mean" id="meaning"></div>
    <ol id="examples"></ol>
    <button onclick="prevWord()" class="gray">이전</button>
    <button onclick="nextWord()">다음</button>
    <button onclick="speakWord()" class="green">발음</button>
    <button onclick="toggleMeaning()" class="gray">뜻 가리기</button>
    <button onclick="markWord()" class="green">암기 완료</button>
    <p id="wordStatus" class="small"></p>
  </section>

  <section id="bible" class="card hidden">
    <h2>신약 27권 30일 통독</h2>
    <p class="small">신세계역 성경 본문은 공식 성경/앱에서 읽고, 이 앱은 계획표와 체크·메모용으로 사용합니다.</p>
    <div class="progressBox"><div id="bibleBar" class="bar"></div></div>
    <p id="bibleStatus"></p>
    <div id="bibleList"></div>
    <h3>오늘 묵상 메모</h3>
    <textarea id="memo" placeholder="오늘 기억하고 싶은 성구, 느낀 점, 적용할 점을 적어보세요."></textarea>
    <button onclick="saveMemo()" class="green">메모 저장</button>
    <p class="small" id="memoSaved"></p>
  </section>
</div>

let idx = Number(localStorage.getItem("wordIndex")||0);
let hiddenMean = false;

function showTab(id,btn){
 document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
 document.getElementById(id).classList.remove("hidden");
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 btn.classList.add("active");
 updateAll();
}

function learnedWords(){
 let a=JSON.parse(localStorage.getItem("learnedWords")||"[]");
 return new Set(a);
}
function saveLearned(set){
 localStorage.setItem("learnedWords",JSON.stringify([...set]));
}
function renderWord(){
 let w=WORDS[idx];
 document.getElementById("word").textContent=w[0];
 document.getElementById("meaning").textContent=hiddenMean ? "뜻 가림" : w[1];
 document.getElementById("examples").innerHTML=w[2].map(e=>"<li>"+e+"</li>").join("");
 localStorage.setItem("wordIndex",idx);
 let day=Math.floor(idx/17)+1;
 document.getElementById("engDay").textContent="현재 위치: "+day+"일차 / "+(idx+1)+"번째 단어";
 let learned=learnedWords();
 document.getElementById("wordStatus").textContent="암기 완료: "+learned.size+" / 1000개";
 document.getElementById("engBar").style.width=(learned.size/1000*100)+"%";
}
function nextWord(){idx=(idx+1)%WORDS.length; renderWord(); updateAll();}
function prevWord(){idx=(idx-1+WORDS.length)%WORDS.length; renderWord(); updateAll();}
function toggleMeaning(){hiddenMean=!hiddenMean; renderWord();}
function markWord(){
 let s=learnedWords(); s.add(idx); saveLearned(s); nextWord();
}
function speakWord(){
 let u=new SpeechSynthesisUtterance(WORDS[idx][0]);
 u.lang="en-US"; speechSynthesis.speak(u);
}

function renderBible(){
 const done = JSON.parse(localStorage.getItem("bibleDone")||"[]");
 const doneSet = new Set(done);
 document.getElementById("bibleList").innerHTML = BIBLE.map((d,i)=>`
  <div class="dayrow">
   <input type="checkbox" ${doneSet.has(i)?"checked":""} onchange="toggleBible(${i},this.checked)">
   <div class="daytext"><b>${d[0]}</b><br>${d[1]}</div>
  </div>`).join("");
 let count=doneSet.size;
 document.getElementById("bibleStatus").textContent="읽기 완료: "+count+" / 30일";
 document.getElementById("bibleBar").style.width=(count/30*100)+"%";
 document.getElementById("memo").value=localStorage.getItem("bibleMemo")||"";
}
function toggleBible(i,checked){
 let done = new Set(JSON.parse(localStorage.getItem("bibleDone")||"[]"));
 if(checked) done.add(i); else done.delete(i);
 localStorage.setItem("bibleDone",JSON.stringify([...done]));
 updateAll();
}
function saveMemo(){
 localStorage.setItem("bibleMemo",document.getElementById("memo").value);
 document.getElementById("memoSaved").textContent="저장되었습니다.";
}

function updateAll(){
 renderWord();
 renderBible();
 let ew=learnedWords().size;
 let bd=new Set(JSON.parse(localStorage.getItem("bibleDone")||"[]")).size;
 let total=(ew/1000*50)+(bd/30*50);
 document.getElementById("totalText").textContent="영어 "+ew+"/1000개, 성경 "+bd+"/30일 완료";
 document.getElementById("totalBar").style.width=total+"%";
}
updateAll();
